<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darshan Wahurwagh | Linktree</title>

  <!-- Font Awesome Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #4fa3c7, #1e3c9a);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 20px;
    }

    /* Profile Image */
    .profile-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      padding: 8px;
      margin: 0 auto 15px;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 18px 20px;
      margin-bottom: 18px;
      border-radius: 40px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      background: transparent;
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .btn span {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dots {
      opacity: 0.7;
    }

    /* Social Icons */
    .socials {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 35px;
    }

    .socials a {
      color: #fff;
      font-size: 34px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .socials a:hover {
      transform: scale(1.15);
      opacity: 0.8;
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      h1 {
        font-size: 22px;
      }

      .btn {
        font-size: 16px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Profile Image -->
    <!-- Replace src with your image path -->
    <img src="https://i.ibb.co/Xfm1zmLT/x.jpg" alt="Profile" class="profile-img" />

    <h1>Darshan Wahurwagh</h1>

    <!-- Buttons -->
    <button class="btn" onclick="openDesktop()">
      <span>
          View Portfolio
        <!-- <i class="fa-solid fa-desktop"></i> -->
      </span>
      <!-- <i class="fa-solid fa-ellipsis-vertical dots"></i> -->
    </button>

    <button class="btn" onclick="openMobile()">
      <span>
        See My DINQ Card
      <!-- <i class="fa-solid fa-file-lines"></i>Documents / Portfolio -->
      <i class="fa-solid fa-user-tie"></i><!-- Professional Profile -->
      </span>
      <!-- <i class="fa-solid fa-ellipsis-vertical dots"></i> -->
    </button>

    <!-- Social Icons -->
    <div class="socials">
      <a href="https://github.com/darshanwahurwagh" target="_blank">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="mailto:darshanwahurwagh66@gmail.com">
        <i class="fa-solid fa-envelope"></i>
      </a>
      <a href="https://linkedin.com/in/darshanwahurwagh" target="_blank">
        <i class="fa-brands fa-linkedin"></i>
      </a>
    </div>

  </div>

  <script>
    function openDesktop() {
      window.location.href = "https://darshanwahurwagh.vercel.app/";
    }

    function openMobile() {
      window.location.href = "https://dinq.me/darshanwahurwagh";
    }
  </script>

</body>
</html>
